# SwiftLint configuration — complementary to swift-format.
# swift-format owns all layout/formatting rules. SwiftLint owns policy
# and idiom rules swift-format doesn't cover.
# See guides/CODE_GUIDE.md and plans/2026-04-22-swift-code-guide-design.md.

excluded:
  - .build
  - .DerivedData-ios
  - .DerivedData-mac
  - .worktrees
  - Moolah.xcodeproj
  - build
  - scripts
  - fastlane

disabled_rules:
  # swift-format territory — do not enable these.
  - line_length
  - trailing_comma
  - opening_brace
  - closure_spacing
  - colon
  - comma
  - operator_whitespace
  - return_arrow_whitespace
  - statement_position
  - trailing_whitespace
  - vertical_whitespace
  - sorted_imports

opt_in_rules:
  - array_init
  - attributes
  - closure_body_length
  - closure_end_indentation
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_header
  - file_name
  - first_where
  - flatmap_over_map_reduce
  - force_cast
  - force_try
  - force_unwrapping
  - identical_operands
  - implicit_return
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - let_var_whitespace
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - nimble_operator
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - strict_fileprivate
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - untyped_error_in_catch
  - unused_declaration
  - unused_import
  - vertical_parameter_alignment_on_call
  - yoda_condition

# SwiftLint (0.63) rejects per-rule `excluded:` on `file_length` and
# `type_body_length` (surfaces as "invalid key(s) 'excluded'"), and silently
# ignores it on `function_body_length`. Path-scoping would require moving
# test files under the top-level `excluded:` list, which we don't want.
file_length:
  warning: 400
  error: 1000

type_body_length:
  warning: 250
  error: 350

function_body_length:
  warning: 50
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level:
    warning: 1
  function_level:
    warning: 2

identifier_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 40
    error: 60
  excluded: [id, x, y, i, j, n, ok, to]

large_tuple:
  warning: 2
  error: 3

# Permits `@Environment(AuthStore.self) private var authStore` — the dominant
# SwiftUI / SwiftData idiom and what swift-format produces (swift-format sets
# `lineBreakBetweenDeclarationAttributes: false`, so it keeps attribute +
# declaration on the same line when you write them that way).
attributes:
  severity: warning
  attributes_with_arguments_always_on_line_above: false

# swift-format (`lineBreakBeforeEachArgument: false`) wraps calls compactly
# when a single line won't fit, producing the "some-args-per-line" layout
# that `multiline_arguments` forbids. The rule can't be configured to accept
# compact wrapping and flipping the formatter pushes dozens of files past
# `file_length` / `function_body_length`. Instead the rule is scoped via
# nested configs (`MoolahTests/.swiftlint.yml`, `MoolahBenchmarks/.swiftlint.yml`)
# and file-local `// swiftlint:disable multiline_arguments` markers on the
# remaining production files that hit the conflict. New files pick up the
# rule automatically; old files can graduate piecemeal as they're refactored.
multiline_arguments:
  severity: warning

# Opt `multiline_arguments` into the allow-blanket-disable list: the rule
# fundamentally conflicts with swift-format's compact call-site wrapping,
# so the only viable escape hatch on the affected files is a file-level
# `// swiftlint:disable multiline_arguments`. Per-line disables would add
# thousands of throwaway comments. See the `multiline_arguments:` block
# above for the full rationale.
blanket_disable_command:
  always_blanket_disable:
    - multiline_arguments

# SwiftLint (0.63) silently ignores per-rule `excluded:` on `force_try`,
# `force_cast`, `force_unwrapping`, and `implicitly_unwrapped_optional`
# (no "invalid key" warning, but violation counts are unchanged whether the
# paths are present or omitted). Path-scoping would require moving test
# files under the top-level `excluded:` list, which we don't want.
force_try:
  severity: warning

force_cast:
  severity: warning

force_unwrapping:
  severity: warning

implicitly_unwrapped_optional:
  severity: warning
