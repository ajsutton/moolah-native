name: TestFlight

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g., 1.0.0-monthly.202604)"
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: "Version to build"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-26
    timeout-minutes: 30
    environment: testflight

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install tools
        run: brew install xcodegen just

      - name: Set up Ruby
        uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92 # v1.300.0
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            # Extract base semver (e.g., 1.0.0 from 1.0.0-monthly.202604)
            VERSION=$(echo "${{ inputs.version }}" | sed 's/-.*//')
          else
            VERSION=${GITHUB_REF_NAME#v}
            # Also strip any suffix from tag (e.g., v1.0.0-rc1 → 1.0.0)
            VERSION=$(echo "$VERSION" | sed 's/-.*//')
          fi
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update marketing version
        run: |
          sed -i '' "s/MARKETING_VERSION: .*/MARKETING_VERSION: \"$APP_VERSION\"/" project.yml

      - name: Verify Production schema matches committed baseline
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          CKTOOL_MANAGEMENT_TOKEN: ${{ secrets.CKTOOL_MANAGEMENT_TOKEN }}
        run: just verify-prod-matches-baseline

      - name: Promote CloudKit schema to Production
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          CKTOOL_MANAGEMENT_TOKEN: ${{ secrets.CKTOOL_MANAGEMENT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just promote-schema

      - name: Deploy to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          CODE_SIGN_STYLE: "Manual"
        run: bundle exec fastlane ios beta

      - name: Upload IPA artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Moolah-${{ env.APP_VERSION }}.ipa
          path: build/Moolah.ipa
