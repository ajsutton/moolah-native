name: Monthly TestFlight Build

on:
  schedule:
    - cron: "0 9 1 * *"  # 9 AM UTC on the 1st of each month
  workflow_dispatch: {}    # Allow manual trigger

permissions:
  contents: read

jobs:
  monthly-build:
    name: Trigger Monthly TestFlight Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'MARKETING_VERSION:' project.yml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          MONTH=$(date -u +%Y%m)
          echo "version=${VERSION}-monthly.${MONTH}" >> "$GITHUB_OUTPUT"

      - name: Trigger TestFlight build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run testflight.yml -f version="${{ steps.version.outputs.version }}"
