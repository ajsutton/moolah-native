name: Monthly RC

on:
  schedule:
    - cron: "0 9 1 * *"  # 9 AM UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  cut-rc:
    name: Cut monthly RC
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install just
        run: brew install just

      - name: Compute next RC version
        id: version
        run: |
          JSON=$(just release-next-version rc)
          VERSION=$(echo "$JSON" | jq -r .version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GH pre-release with auto-generated notes
        # Doesn't go through scripts/release-create-rc.sh because that script
        # requires a `--notes-file`, and the cron path uses `--generate-notes`
        # (mutually exclusive). The version is computed by the same library
        # used in release-create-rc and is well-formed by construction.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
              --target main \
              --title "${{ steps.version.outputs.tag }}" \
              --prerelease \
              --generate-notes
          # release-rc.yml fires from the tag push that gh release just created.
