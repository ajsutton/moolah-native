name: Monthly RC

on:
  schedule:
    - cron: "0 9 1 * *"  # 9 AM UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  cut-rc:
    name: Cut monthly RC
    runs-on: macos-26
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install just
        run: brew install just

      - name: Compute next RC version
        id: version
        run: |
          JSON=$(just release-next-version rc)
          VERSION=$(echo "$JSON" | jq -r .version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GH pre-release with auto-generated notes
        # Doesn't go through scripts/release-create-rc.sh because that script
        # requires a `--notes-file`, and the cron path uses `--generate-notes`
        # (mutually exclusive). The version is computed by the same library
        # used in release-create-rc and is well-formed by construction.
        #
        # The downstream `build-rc` job invokes release-rc.yml via
        # workflow_call: tags created by GITHUB_TOKEN don't fire other
        # workflows, so the implicit tag-push trigger on release-rc.yml is
        # not enough on the cron path.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
              --target main \
              --title "${{ steps.version.outputs.tag }}" \
              --prerelease \
              --generate-notes

  build-rc:
    name: Build & publish RC artefacts
    needs: cut-rc
    uses: ./.github/workflows/release-rc.yml
    with:
      tag: ${{ needs.cut-rc.outputs.tag }}
    secrets: inherit
