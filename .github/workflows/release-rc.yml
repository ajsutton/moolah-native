name: Release RC

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"
  workflow_call:
    inputs:
      tag:
        description: "Existing RC tag to build (e.g. v1.1.0-rc.11). Required when invoked via workflow_call; ignored on push:tags."
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  preflight:
    name: Preflight schema check
    runs-on: macos-26
    timeout-minutes: 15
    environment: testflight
    outputs:
      deploy_needed: ${{ steps.check.outputs.deploy_needed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install tools
        run: brew install just

      - name: Verify Production schema matches schema.ckdb
        id: check
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          CKTOOL_MANAGEMENT_TOKEN: ${{ secrets.CKTOOL_MANAGEMENT_TOKEN }}
        run: |
          if just verify-prod-deployed; then
              echo "Production schema matches CloudKit/schema.ckdb."
              echo "deploy_needed=false" >> "$GITHUB_OUTPUT"
              exit 0
          fi

          echo "Production schema differs from CloudKit/schema.ckdb — staging Dev for manual deploy."
          just import-schema-to-dev
          echo "deploy_needed=true" >> "$GITHUB_OUTPUT"

          {
              echo "## Manual schema deploy required"
              echo
              echo "The proposed schema in \`CloudKit/schema.ckdb\` does not match live Production. The Development environment has been staged with the proposed schema."
              echo
              echo "### To proceed"
              echo
              echo "1. Open the [CloudKit Console](https://icloud.developer.apple.com/dashboard/) for container \`iCloud.rocks.moolah.app.v2\`."
              echo "2. Schema → **Deploy Schema Changes to Production**."
              echo "3. Review the diff (it should match what you see in this commit's \`CloudKit/schema.ckdb\`)."
              echo "4. Confirm Deploy."
              echo "5. Return to this workflow run and approve the **await-prod-deploy** job."
              echo
              echo "If the diff in the Console looks wrong, do NOT click Deploy. Instead, fix \`CloudKit/schema.ckdb\` on \`main\` and cut a new RC."
          } >> "$GITHUB_STEP_SUMMARY"

  await-prod-deploy:
    name: Await manual production schema deploy
    needs: preflight
    if: needs.preflight.outputs.deploy_needed == 'true'
    runs-on: macos-26
    timeout-minutes: 360  # gives the operator up to 6 hours to perform the manual Console deploy and approve
    environment: await-prod-deploy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install tools
        run: brew install just

      - name: Re-verify Production schema is now deployed
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          CKTOOL_MANAGEMENT_TOKEN: ${{ secrets.CKTOOL_MANAGEMENT_TOKEN }}
        run: |
          if ! just verify-prod-deployed; then
              echo "::error::Production schema still does not match CloudKit/schema.ckdb after approval. Did the Console deploy succeed?" >&2
              exit 1
          fi

  build:
    name: Build & Upload RC artefacts
    needs: [preflight, await-prod-deploy]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.preflight.outputs.deploy_needed == 'false' ||
       needs.await-prod-deploy.result == 'success')
    runs-on: macos-26
    timeout-minutes: 60
    environment: testflight

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install tools
        run: brew install xcodegen just

      - name: Set up Ruby
        uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92 # v1.300.0
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Extract base version from tag
        id: version
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          # v1.2.0-rc.1 → 1.2.0
          BASE_VERSION="${TAG#v}"
          BASE_VERSION="${BASE_VERSION%%-rc.*}"
          {
              echo "base=$BASE_VERSION"
              echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Update marketing version
        run: |
          sed -i '' "s/MARKETING_VERSION: .*/MARKETING_VERSION: \"${{ steps.version.outputs.base }}\"/" project.yml

      - name: Build & upload iOS to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: bundle exec fastlane ios beta

      - name: Capture TestFlight build number
        run: |
          # Fastlane writes the new build number into project.pbxproj.
          # Read it back so we can attach it to the GH release.
          BUILD=$(grep -m1 'CURRENT_PROJECT_VERSION' Moolah.xcodeproj/project.pbxproj \
              | head -1 \
              | sed 's/.*= \([0-9]*\);/\1/')
          if [[ -z "$BUILD" ]]; then
              echo "Could not read CURRENT_PROJECT_VERSION from pbxproj" >&2
              exit 1
          fi
          echo "$BUILD" > build/build-number.txt
          echo "Build number: $BUILD"

      - name: Build & notarise Mac zip
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: bundle exec fastlane mac zip version:${{ steps.version.outputs.base }}

      - name: Attach Mac zip and build-number to GH pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
              "build/Moolah-${{ steps.version.outputs.base }}.zip" \
              build/build-number.txt \
              --clobber

      - name: Refresh schema-prod-baseline if changed
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          CKTOOL_MANAGEMENT_TOKEN: ${{ secrets.CKTOOL_MANAGEMENT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just refresh-prod-baseline

      - name: Upload IPA workflow artefact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Moolah-${{ steps.version.outputs.tag }}.ipa
          path: build/Moolah.ipa
