name: CI

on:
  push:
    branches:
      - master
      - main
      - 'mq-spec-*'   # speculative merge-queue branches; CI runs without a PR
  pull_request:

jobs:
  test:
    name: Test
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: brew install xcodegen just swift-format

      - name: Generate Xcode project
        run: just generate

      - name: Validate App Store requirements
        run: just validate-appstore

      - name: Format check
        run: just format-check

      - name: Test
        run: just test

  ui-test:
    name: UI Test
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: brew install xcodegen just swift-format

      - name: Generate Xcode project
        run: just generate

      - name: UI Test
        id: ui-test
        run: just test-ui

      - name: Upload UI failure artefacts
        if: failure() && steps.ui-test.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ui-fail-artefacts
          path: .agent-tmp/ui-fail-*
          if-no-files-found: ignore
          retention-days: 7
