name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: brew install xcodegen just swift-format

      - name: Generate Xcode project
        run: just generate

      - name: Validate App Store requirements
        run: just validate-appstore

      - name: Format check
        run: just format-check

      - name: Test
        run: just test
