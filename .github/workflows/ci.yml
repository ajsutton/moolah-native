name: CI

on:
  push:
    branches:
      - master
      - main
      - 'mq-spec-*'   # speculative merge-queue branches; CI runs without a PR
  pull_request:

jobs:
  test:
    name: Test
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: brew install xcodegen just swift-format swiftlint

      - name: Generate Xcode project
        run: just generate

      - name: Validate App Store requirements
        run: just validate-appstore

      - name: Format check
        run: just format-check

      # Fork PRs: format-only (no network, no token). Keeps the TODO
      # convention enforced while never exposing GITHUB_TOKEN to untrusted
      # code from forks.
      - name: Validate TODO format (fork-safe)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: bash scripts/check-todos.sh --format-only

      # Trusted events only (pushes to origin branches, same-repo PRs):
      # full check including liveness against the GitHub API.
      - name: Validate TODO references (liveness)
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just validate-todos

      - name: Test
        run: just test

  ui-test:
    name: UI Test
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: brew install xcodegen just swift-format swiftlint

      - name: Generate Xcode project
        run: just generate

      - name: UI Test
        id: ui-test
        run: just test-ui

      - name: Upload UI failure artefacts
        if: failure() && steps.ui-test.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ui-fail-artefacts
          path: .agent-tmp/ui-fail-*
          if-no-files-found: ignore
          retention-days: 7

  schema-check:
    name: CloudKit schema additivity
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: brew install just

      - name: Check schema is additive over Production baseline
        run: just check-schema-additive
