name: Moolah
options:
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  defaultConfig: Debug
  bundleIdPrefix: rocks.moolah

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_TESTABILITY: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES

    # ---- Versioning ----
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

    # ---- Signing (env-driven) ----
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}

    # Default to Automatic if env var not set
    CODE_SIGN_STYLE: ${CODE_SIGN_STYLE}

    # Only used when CODE_SIGN_STYLE=Manual
    CODE_SIGN_IDENTITY: ${CODE_SIGN_IDENTITY}
    PROVISIONING_PROFILE_SPECIFIER: ${PROVISIONING_PROFILE_SPECIFIER}

    # Keep Xcode predictable
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES

fileGroups:
  - plans
  - CLAUDE.md
  - guides
  - BUGS.md
  - justfile
  - project.yml

targets:
  Moolah_iOS:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Domain
      - path: Backends
      - path: Features
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rocks.moolah.app
        PRODUCT_NAME: Moolah
        PRODUCT_MODULE_NAME: Moolah
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Override XcodeGen auto-discovery of App/Moolah.entitlements.
        # The entitlements include App Sandbox and CloudKit container IDs
        # which cause iOS simulator crashes on CI without provisioning.
        # The Fastfile injects entitlements via xcargs for TestFlight only.
        CODE_SIGN_ENTITLEMENTS: ""

  Moolah_macOS:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Domain
      - path: Backends
      - path: Features
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rocks.moolah.app
        PRODUCT_NAME: Moolah
        PRODUCT_MODULE_NAME: Moolah
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_ENTITLEMENTS: ""  # Same as iOS — entitlements injected at release time
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES

  MoolahTests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MoolahTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rocks.moolah.tests
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Moolah.app/Moolah"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Moolah_iOS

  MoolahTests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MoolahTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rocks.moolah.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        ENABLE_HARDENED_RUNTIME: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Moolah.app/Contents/MacOS/Moolah"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Moolah_macOS

  MoolahBenchmarks_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MoolahBenchmarks
      - path: MoolahTests/Support
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rocks.moolah.benchmarks
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        ENABLE_HARDENED_RUNTIME: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Moolah.app/Contents/MacOS/Moolah"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Moolah_macOS

schemes:
  Moolah:
    build:
      targets:
        Moolah_iOS: all
        Moolah_macOS: all
    run:
      executable: Moolah_macOS

  Moolah-iOS:
    build:
      targets:
        Moolah_iOS: all
    test:
      targets:
        - MoolahTests_iOS

  Moolah-macOS:
    build:
      targets:
        Moolah_macOS: all
    test:
      targets:
        - MoolahTests_macOS

  Moolah-Benchmarks:
    build:
      targets:
        Moolah_macOS: all
        MoolahBenchmarks_macOS: [test]
    test:
      targets:
        - MoolahBenchmarks_macOS
