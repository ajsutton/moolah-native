name: Moolah
options:
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  defaultConfig: Debug
  bundleIdPrefix: com.moolah

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_TESTABILITY: YES

targets:
  Moolah_iOS:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Domain
      - path: Backends
      - path: Features
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moolah.app
        PRODUCT_MODULE_NAME: Moolah
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # iOS Simulator doesn't require signing
        CODE_SIGN_IDENTITY: "Apple Development"
        "CODE_SIGN_IDENTITY[sdk=macosx*]": "Apple Development"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGN_STYLE: "Automatic"
        DEVELOPMENT_TEAM: "P8LX6DFJM4"
        PROVISIONING_PROFILE_SPECIFIER: ""

  Moolah_macOS:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Domain
      - path: Backends
      - path: Features
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moolah.app
        PRODUCT_NAME: Moolah
        PRODUCT_MODULE_NAME: Moolah
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Ad-hoc signing (-) satisfies Gatekeeper for local runs.
        # Hardened Runtime requires a real certificate, so disable it.
        CODE_SIGN_IDENTITY: "Apple Development"
        "CODE_SIGN_IDENTITY[sdk=macosx*]": "Apple Development"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGN_STYLE: "Automatic"
        DEVELOPMENT_TEAM: "P8LX6DFJM4"
        PROVISIONING_PROFILE_SPECIFIER: ""
        ENABLE_HARDENED_RUNTIME: NO

  MoolahTests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MoolahTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moolah.tests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - target: Moolah_iOS

  MoolahTests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MoolahTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moolah.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        ENABLE_HARDENED_RUNTIME: NO
        # Moolah_macOS uses PRODUCT_NAME=Moolah so it builds as Moolah.app,
        # not Moolah_macOS.app. XcodeGen derives TEST_HOST from the target
        # name, so we override it here to match the actual product name.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Moolah.app/Contents/MacOS/Moolah"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Moolah_macOS

schemes:
  Moolah:
    build:
      targets:
        Moolah_iOS: all
        Moolah_macOS: all
    run:
      executable: Moolah_macOS

  Moolah-iOS:
    build:
      targets:
        Moolah_iOS: all
    test:
      targets:
        - MoolahTests_iOS

  Moolah-macOS:
    build:
      targets:
        Moolah_macOS: all
    test:
      targets:
        - MoolahTests_macOS
