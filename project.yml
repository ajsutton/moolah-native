name: Moolah
options:
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  defaultConfig: Debug
  bundleIdPrefix: com.moolah

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_TESTABILITY: YES

targets:
  Moolah_iOS:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Domain
      - path: Backends
      - path: Features
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moolah.app
        INFOPLIST_FILE: App/Info.plist
        # iOS Simulator doesn't require signing
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  Moolah_macOS:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Domain
      - path: Backends
      - path: Features
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moolah.app
        INFOPLIST_FILE: App/Info.plist
        # Ad-hoc signing (-) satisfies Gatekeeper for local runs.
        # Hardened Runtime requires a real certificate, so disable it.
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        ENABLE_HARDENED_RUNTIME: NO

  MoolahTests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MoolahTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moolah.tests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - target: Moolah_iOS

  MoolahTests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MoolahTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moolah.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        ENABLE_HARDENED_RUNTIME: NO
    dependencies:
      - target: Moolah_macOS

schemes:
  Moolah:
    build:
      targets:
        Moolah_iOS: all
        Moolah_macOS: all
    test:
      targets:
        - MoolahTests_iOS
        - MoolahTests_macOS
