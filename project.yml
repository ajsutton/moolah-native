name: Moolah
options:
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  defaultConfig: Debug
  bundleIdPrefix: rocks.moolah

# Debug-Tests is an iCloud-free variant of Debug used by every scheme's test
# action. Keeps local `ENABLE_ENTITLEMENTS=1` dev flows (run on Debug) isolated
# from `just test` — see plans/2026-04-20-strip-icloud-from-tests-design.md.
configs:
  Debug: debug
  Debug-Tests: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_TESTABILITY: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES

    # ---- Versioning ----
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

    # ---- Signing (env-driven) ----
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}

    # Default to Automatic if env var not set
    CODE_SIGN_STYLE: ${CODE_SIGN_STYLE}

    # Only used when CODE_SIGN_STYLE=Manual
    CODE_SIGN_IDENTITY: ${CODE_SIGN_IDENTITY}
    PROVISIONING_PROFILE_SPECIFIER: ${PROVISIONING_PROFILE_SPECIFIER}

    # Keep Xcode predictable
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES

fileGroups:
  - plans
  - CLAUDE.md
  - guides
  - justfile
  - project.yml

targets:
  Moolah_iOS:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - Info-macOS.plist
      - path: Domain
      - path: Backends
      - path: Features
      - path: Shared
      - path: Automation
      - path: UITestSupport
    dependencies:
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rocks.moolah.app
        PRODUCT_NAME: Moolah
        PRODUCT_MODULE_NAME: Moolah
        INFOPLIST_FILE: App/Info-iOS.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CLOUDKIT_ENVIRONMENT: Development
        Debug-Tests:
          # Tests must never pick up iCloud entitlements, even when a dev
          # runs `ENABLE_ENTITLEMENTS=1 just generate` to inject them into Debug.
          CODE_SIGN_ENTITLEMENTS: ""
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
          # Value is unused at runtime (test host has no iCloud entitlement
          # and uses in-memory stores) but must be defined so Info.plist
          # expansion yields a literal string rather than "$(CLOUDKIT_ENVIRONMENT)".
          CLOUDKIT_ENVIRONMENT: Development
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) CLOUDKIT_ENABLED"
          CLOUDKIT_ENVIRONMENT: Production

  Moolah_macOS:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - Info-iOS.plist
      - path: Domain
      - path: Backends
      - path: Features
      - path: Shared
      - path: Automation
      - path: UITestSupport
    dependencies:
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rocks.moolah.app
        PRODUCT_NAME: Moolah
        PRODUCT_MODULE_NAME: Moolah
        INFOPLIST_FILE: App/Info-macOS.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CLOUDKIT_ENVIRONMENT: Development
        Debug-Tests:
          CODE_SIGN_ENTITLEMENTS: ""
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
          CLOUDKIT_ENVIRONMENT: Development
        Release:
          ENABLE_HARDENED_RUNTIME: YES
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) CLOUDKIT_ENABLED"
          CLOUDKIT_ENVIRONMENT: Production

  MoolahTests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MoolahTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rocks.moolah.tests
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Moolah.app/Moolah"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Moolah_iOS

  MoolahTests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MoolahTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rocks.moolah.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        ENABLE_HARDENED_RUNTIME: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Moolah.app/Contents/MacOS/Moolah"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Moolah_macOS

  MoolahBenchmarks_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MoolahBenchmarks
      - path: MoolahTests/Support
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rocks.moolah.benchmarks
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        ENABLE_HARDENED_RUNTIME: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Moolah.app/Contents/MacOS/Moolah"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Moolah_macOS

  MoolahUITests_macOS:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: MoolahUITests_macOS
      - path: UITestSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rocks.moolah.uitests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        ENABLE_HARDENED_RUNTIME: NO
        TEST_TARGET_NAME: Moolah_macOS
    dependencies:
      - target: Moolah_macOS

schemes:
  Moolah:
    build:
      targets:
        Moolah_iOS: all
        Moolah_macOS: all
    run:
      executable: Moolah_macOS

  Moolah-iOS:
    build:
      targets:
        Moolah_iOS: all
    test:
      config: Debug-Tests
      targets:
        - MoolahTests_iOS

  Moolah-macOS:
    build:
      targets:
        Moolah_macOS: all
    test:
      config: Debug-Tests
      targets:
        - MoolahTests_macOS

  Moolah-Benchmarks:
    build:
      targets:
        Moolah_macOS: all
        MoolahBenchmarks_macOS: [test]
    test:
      config: Debug-Tests
      targets:
        - MoolahBenchmarks_macOS

  Moolah-macOS-UITests:
    build:
      targets:
        Moolah_macOS: all
        MoolahUITests_macOS: [test]
    test:
      config: Debug-Tests
      targets:
        - MoolahUITests_macOS
