name: Moolah
options:
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  defaultConfig: Debug
  bundleIdPrefix: com.moolah

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_TESTABILITY: YES

    # ---- Signing (env-driven) ----
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}

    # Default to Automatic if env var not set
    CODE_SIGN_STYLE: ${CODE_SIGN_STYLE}

    # Only used when CODE_SIGN_STYLE=Manual
    CODE_SIGN_IDENTITY: ${CODE_SIGN_IDENTITY}
    PROVISIONING_PROFILE_SPECIFIER: ${PROVISIONING_PROFILE_SPECIFIER}

    # Keep Xcode predictable
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES

targets:
  Moolah_iOS:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Domain
      - path: Backends
      - path: Features
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moolah.app
        PRODUCT_MODULE_NAME: Moolah
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  Moolah_macOS:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Domain
      - path: Backends
      - path: Features
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moolah.app
        PRODUCT_NAME: Moolah
        PRODUCT_MODULE_NAME: Moolah
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: NO

  MoolahTests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MoolahTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moolah.tests
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - target: Moolah_iOS

  MoolahTests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MoolahTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moolah.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        ENABLE_HARDENED_RUNTIME: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Moolah.app/Contents/MacOS/Moolah"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Moolah_macOS

schemes:
  Moolah:
    build:
      targets:
        Moolah_iOS: all
        Moolah_macOS: all
    run:
      executable: Moolah_macOS

  Moolah-iOS:
    build:
      targets:
        Moolah_iOS: all
    test:
      targets:
        - MoolahTests_iOS

  Moolah-macOS:
    build:
      targets:
        Moolah_macOS: all
    test:
      targets:
        - MoolahTests_macOS
