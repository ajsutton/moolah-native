<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Dark appearance: a darker-mode adaptation of the standard icon. The
    "any" icon already uses a deep-space palette; the dark variant pulls
    that further down so the icon recedes naturally into a dark wallpaper
    rather than glowing as if lit. Peak gradients are darkened, sparkles
    are dimmed, and a subtle vignette is reinforced.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="80%">
      <stop offset="0%"  stop-color="#0A1740"/>
      <stop offset="55%" stop-color="#040A1C"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <linearGradient id="blueLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#5C8FCC"/>
      <stop offset="40%" stop-color="#1F5DB0"/>
      <stop offset="100%" stop-color="#0A2570"/>
    </linearGradient>
    <linearGradient id="blueDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#0A1F55"/>
      <stop offset="60%" stop-color="#040D32"/>
      <stop offset="100%" stop-color="#01030F"/>
    </linearGradient>
    <linearGradient id="blueTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#A8CFF2"/>
      <stop offset="100%" stop-color="#3974BD"/>
    </linearGradient>

    <linearGradient id="redLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#D49893"/>
      <stop offset="40%" stop-color="#A53037"/>
      <stop offset="100%" stop-color="#5E0A1A"/>
    </linearGradient>
    <linearGradient id="redDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#4A0815"/>
      <stop offset="60%" stop-color="#2C040C"/>
      <stop offset="100%" stop-color="#0F0205"/>
    </linearGradient>
    <linearGradient id="redTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#E8B5B0"/>
      <stop offset="100%" stop-color="#B5564E"/>
    </linearGradient>

    <radialGradient id="gemGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="35%" stop-color="#9CF3FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0EB1FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gemTopL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D5ECFB"/>
      <stop offset="100%" stop-color="#3A7FB2"/>
    </linearGradient>
    <linearGradient id="gemTopR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F3D3CF"/>
      <stop offset="100%" stop-color="#B85852"/>
    </linearGradient>
    <linearGradient id="gemL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C7BB8"/>
      <stop offset="100%" stop-color="#06277A"/>
    </linearGradient>
    <linearGradient id="gemR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B5474C"/>
      <stop offset="100%" stop-color="#5E0A1A"/>
    </linearGradient>

    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#FFE9A8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFB347" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="groundShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <symbol id="spark" viewBox="-10 -10 20 20">
      <path d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z" fill="#FFFFFF"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Starfield (dimmed for dark mode) -->
  <g fill="#FFFFFF" opacity="0.22">
    <circle cx="120"  cy="180" r="1.8"/>
    <circle cx="220"  cy="90"  r="1.3"/>
    <circle cx="880"  cy="120" r="1.9"/>
    <circle cx="940"  cy="260" r="1.3"/>
    <circle cx="80"   cy="360" r="1.4"/>
    <circle cx="970"  cy="430" r="1.6"/>
    <circle cx="760"  cy="80"  r="1.2"/>
    <circle cx="420"  cy="100" r="1.3"/>
    <circle cx="600"  cy="70"  r="1.5"/>
    <circle cx="320"  cy="180" r="1.0"/>
    <circle cx="720"  cy="180" r="1.0"/>
  </g>
  <g fill="#9FE1FF" opacity="0.35">
    <circle cx="290" cy="240" r="2.4"/>
    <circle cx="820" cy="210" r="2.6"/>
    <circle cx="180" cy="140" r="2.0"/>
    <circle cx="910" cy="140" r="2.2"/>
  </g>

  <!-- Ground shadow -->
  <ellipse cx="512" cy="906" rx="460" ry="44" fill="url(#groundShadow)"/>

  <!-- LEFT PEAK: BLUE (income). Cap constrained to silhouette at y=196. -->
  <polygon points="296,176 388,176 388,876 60,876" fill="url(#blueLight)"/>
  <polygon points="388,176 584,876 388,876" fill="url(#blueDark)"/>
  <polygon points="296,176 388,176 394,196 289,196" fill="url(#blueTop)"/>
  <polyline points="296,176 60,876" fill="none" stroke="#9DC0E8" stroke-width="4" stroke-linecap="butt" opacity="0.7"/>
  <polyline points="388,176 584,876" fill="none" stroke="#01030F" stroke-width="3" stroke-linecap="butt" opacity="0.85"/>
  <line x1="388" y1="176" x2="388" y2="876" stroke="#0F2870" stroke-width="2" opacity="0.55"/>

  <!-- RIGHT PEAK: RED (expense). Cap constrained to silhouette at y=196. -->
  <polygon points="636,176 728,176 964,876 636,876" fill="url(#redLight)"/>
  <polygon points="636,176 636,876 440,876" fill="url(#redDark)"/>
  <polygon points="636,176 728,176 735,196 630,196" fill="url(#redTop)"/>
  <polyline points="728,176 964,876" fill="none" stroke="#E8B5B0" stroke-width="4" stroke-linecap="butt" opacity="0.7"/>
  <polyline points="636,176 440,876" fill="none" stroke="#0F0205" stroke-width="3" stroke-linecap="butt" opacity="0.85"/>
  <line x1="636" y1="176" x2="636" y2="876" stroke="#5E0A1A" stroke-width="2" opacity="0.6"/>

  <!-- Base shadow join between peaks -->
  <polygon points="388,876 584,876 512,900" fill="#01030F" opacity="0.7"/>
  <polygon points="440,876 636,876 512,900" fill="#01030F" opacity="0.6"/>

  <!-- Warm balance glow behind gem -->
  <circle cx="512" cy="560" r="230" fill="url(#goldGlow)" opacity="0.7"/>

  <!-- HEXAGONAL BALANCE GEM (split blue/red) -->
  <g>
    <polygon points="512,420 614,478 614,602 512,660 410,602 410,478" fill="#06091F"/>
    <polygon points="512,420 410,478 512,536" fill="url(#gemTopL)"/>
    <polygon points="512,420 614,478 512,536" fill="url(#gemTopR)"/>
    <polygon points="410,478 512,536 512,660 410,602" fill="url(#gemL)"/>
    <polygon points="614,478 512,536 512,660 614,602" fill="url(#gemR)"/>
    <polygon points="512,420 614,478 614,602 512,660 410,602 410,478" fill="none" stroke="#E0D5B0" stroke-width="3.5" opacity="0.85"/>
    <line x1="512" y1="420" x2="512" y2="660" stroke="#D9B056" stroke-width="3" opacity="0.85"/>
    <line x1="410" y1="478" x2="512" y2="536" stroke="#C0DAE8" stroke-width="2" opacity="0.55"/>
    <line x1="614" y1="478" x2="512" y2="536" stroke="#E8C2BD" stroke-width="2" opacity="0.55"/>
    <polygon points="440,484 500,454 508,492 458,506" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- Sparkles (dimmed) -->
  <g opacity="0.7">
    <use href="#spark" x="360" y="430" width="30" height="30"/>
    <use href="#spark" x="650" y="460" width="22" height="22"/>
    <use href="#spark" x="552" y="370" width="18" height="18"/>
    <use href="#spark" x="470" y="700" width="18" height="18"/>
  </g>

  <!-- Vignette (stronger) -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
    <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="1024" height="1024" fill="url(#vignette)"/>
</svg>
