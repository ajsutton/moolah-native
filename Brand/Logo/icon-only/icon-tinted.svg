<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Tinted appearance: monochromatic foreground on a TRANSPARENT background.
    iOS / macOS composites this against the user's chosen tint colour, so
    every visible element must be white (or grey for depth) — colour
    information is discarded by the system. No background fill.
  -->
  <defs>
    <linearGradient id="peakLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="peakDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.20"/>
    </linearGradient>
    <radialGradient id="gemGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <symbol id="spark" viewBox="-10 -10 20 20">
      <path d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z" fill="#FFFFFF"/>
    </symbol>
  </defs>

  <!-- LEFT PEAK. Cap constrained to silhouette at y=196. -->
  <polygon points="296,176 388,176 388,876 60,876"  fill="url(#peakLight)"/>
  <polygon points="388,176 584,876 388,876"         fill="url(#peakDark)"/>
  <polygon points="296,176 388,176 394,196 289,196" fill="#FFFFFF"/>
  <polyline points="296,176 60,876"  fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="butt" opacity="0.9"/>
  <polyline points="388,176 584,876" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="butt" opacity="0.4"/>
  <line x1="388" y1="176" x2="388" y2="876" stroke="#FFFFFF" stroke-width="2" opacity="0.45"/>

  <!-- RIGHT PEAK. Cap constrained to silhouette at y=196. -->
  <polygon points="636,176 728,176 964,876 636,876" fill="url(#peakLight)"/>
  <polygon points="636,176 636,876 440,876"         fill="url(#peakDark)"/>
  <polygon points="636,176 728,176 735,196 630,196" fill="#FFFFFF"/>
  <polyline points="728,176 964,876" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="butt" opacity="0.9"/>
  <polyline points="636,176 440,876" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="butt" opacity="0.4"/>
  <line x1="636" y1="176" x2="636" y2="876" stroke="#FFFFFF" stroke-width="2" opacity="0.45"/>

  <!-- Soft glow behind gem -->
  <circle cx="512" cy="560" r="230" fill="url(#gemGlow)"/>

  <!-- HEXAGONAL BALANCE GEM -->
  <g>
    <polygon points="512,420 614,478 614,602 512,660 410,602 410,478" fill="#FFFFFF" fill-opacity="0.85"/>
    <!-- top-left facet (lighter) -->
    <polygon points="512,420 410,478 512,536" fill="#FFFFFF" fill-opacity="1.0"/>
    <!-- top-right facet (lighter) -->
    <polygon points="512,420 614,478 512,536" fill="#FFFFFF" fill-opacity="1.0"/>
    <!-- left facet (mid) -->
    <polygon points="410,478 512,536 512,660 410,602" fill="#FFFFFF" fill-opacity="0.65"/>
    <!-- right facet (darker) -->
    <polygon points="614,478 512,536 512,660 614,602" fill="#FFFFFF" fill-opacity="0.45"/>
    <!-- outline -->
    <polygon points="512,420 614,478 614,602 512,660 410,602 410,478" fill="none" stroke="#FFFFFF" stroke-width="3.5"/>
    <!-- dividing spine -->
    <line x1="512" y1="420" x2="512" y2="660" stroke="#FFFFFF" stroke-width="3"/>
    <!-- inner shine -->
    <polygon points="440,484 500,454 508,492 458,506" fill="#FFFFFF" fill-opacity="0.95"/>
  </g>

  <!-- Sparkles -->
  <use href="#spark" x="360" y="430" width="30" height="30"/>
  <use href="#spark" x="650" y="460" width="22" height="22"/>
  <use href="#spark" x="552" y="370" width="18" height="18"/>
  <use href="#spark" x="470" y="700" width="18" height="18"/>
</svg>
